services:
  postgres:
    image: postgres:15-alpine
    container_name: packora-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Youssef1234$
      POSTGRES_DB: packora
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data:
