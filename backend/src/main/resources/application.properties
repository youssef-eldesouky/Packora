spring.application.name=packora

# ========================
# PostgreSQL Configuration
# ========================
# To run this project: create a database called "packora" in pgAdmin, then update credentials below.
spring.datasource.url=jdbc:postgresql://localhost:5432/packora
spring.datasource.username=postgres
spring.datasource.password=Youssef1234$
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / Hibernate
# ========================
# ddl-auto=update  → Hibernate auto-creates/updates tables from entity classes (code-first)
# show-sql=true    → Prints SQL to console for debugging
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ========================
# Server
# ========================
server.port=8080

# ========================
# Paymob Payment Gateway
# ========================
# Set these values as environment variables (never hardcode secrets in git).
#
# How to set locally (Mac/Linux):
#   export PAYMOB_API_KEY=your_api_key_here
#   export PAYMOB_HMAC_SECRET=your_secret_key_here
#
# Or create a .env file and load it before running the app.

paymob.api-key=${PAYMOB_API_KEY}
paymob.hmac-secret=${PAYMOB_HMAC_SECRET}

# Integration ID (Online Card – EGP) — safe to commit, not a secret
paymob.integration-id=5310712

# iFrame ID — safe to commit, not a secret
paymob.iframe-id=964127

# Paymob Accept API Base URL
paymob.base-url=https://accept.paymob.com/api

# App JWT Properties
packora.app.jwtSecret=======================Packora=Spring=Boot=Secret=Key======================
packora.app.jwtExpirationMs=86400000

# ========================
# File Upload
# ========================
packora.upload-dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========================
# Spring Mail (Gmail SMTP)
# ========================
# HOW TO CONFIGURE (pick one option):
#
# OPTION A – Edit directly (dev only, do NOT commit real credentials):
#   Replace the fallback values after the colon:
#   spring.mail.username=${MAIL_USERNAME:PUT_YOUR_GMAIL_HERE}
#   spring.mail.password=${MAIL_PASSWORD:PUT_YOUR_APP_PASSWORD_HERE}
#
# OPTION B – Set environment variables before running (recommended for production):
#   export MAIL_USERNAME=you@gmail.com
#   export MAIL_PASSWORD=abcdefghijklmnop
#   export FRONTEND_URL=http://localhost:3000
#
# HOW TO GET A GMAIL APP PASSWORD:
#   1. Go to myaccount.google.com/security  →  enable 2-Step Verification
#   2. Go to myaccount.google.com/apppasswords
#   3. App name: Packora  →  click Create
#   4. Copy the 16-char password (remove spaces) and paste below
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ========================
# Password Reset Config
# ========================
# Base URL of the frontend (used to build the reset link in the email)
packora.frontend-url=${FRONTEND_URL:http://localhost:3000}
# How long (in minutes) a reset token stays valid
packora.password-reset-token-expiry-minutes=30
