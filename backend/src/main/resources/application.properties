spring.application.name=packora

# ========================
# PostgreSQL Configuration
# ========================
# To run this project: create a database called "packora" in pgAdmin, then update credentials below.
spring.datasource.url=jdbc:postgresql://localhost:5432/packora
spring.datasource.username=postgres
spring.datasource.password=Youssef1234$
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / Hibernate
# ========================
# ddl-auto=update  → Hibernate auto-creates/updates tables from entity classes (code-first)
# show-sql=true    → Prints SQL to console for debugging
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ========================
# Server
# ========================
server.port=8080
