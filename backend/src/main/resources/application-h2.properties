# ========================
# H2 In-Memory DB (Testing)
# ========================
# Overrides PostgreSQL settings — use this profile when PostgreSQL is not running locally
# Start with: ./mvnw spring-boot:run -Dspring-boot.run.profiles=h2

spring.datasource.url=jdbc:h2:mem:packora_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 console — open http://localhost:8080/h2-console to inspect tables
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
