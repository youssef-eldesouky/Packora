# ============================================
# Test profile — H2 in-memory DB (no PostgreSQL needed)
# ============================================
spring.datasource.url=jdbc:h2:mem:packora_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Disable external services during tests
spring.mail.host=localhost
spring.mail.port=25
gemini.api-key=test-key
packora.app.jwtSecret=testSecretKeyForJWTtestSecretKeyForJWT1234567890
packora.app.jwtExpirationMs=86400000
packora.upload-dir=target/test-uploads
packora.frontend-url=http://localhost:3000
packora.allowed-origins=http://localhost:3000
paymob.api-key=test
paymob.hmac-secret=test
paymob.integration-id=0
paymob.iframe-id=0
paymob.base-url=http://localhost
